## ============================================================
##  ОСНОВНЫЕ НАСТРОЙКИ САЙТА — правь только этот блок под себя
## ============================================================
title: "Ксения Журавлева"
tagline: "Архитектор/Инженер-конструктор КЖ"
description: "Портфолио архитектора/инженера-конструктора КЖ: конструктивные решения (КР) и конструкции железобетонные (КЖ) для реставрации, многоэтажного и общественного строительства."

# Замени на свой адрес после создания репозитория username.github.io
# Если репозиторий НЕ называется username.github.io (например site-portfolio),
# укажи baseurl: "/site-portfolio" (со слэшем в начале, без слэша в конце)
url: "https://zhksvit.github.io"
baseurl: ""

lang: ru_RU

## ============================================================
##  ЧИСТЫЕ URL (без .html) — не трогать
## ============================================================
permalink: pretty

## ============================================================
##  КОЛЛЕКЦИЯ ПРОЕКТОВ ПОРТФОЛИО
##  Каждый файл в _projects/ станет отдельной страницей вида
##  /portfolio/nazvanie-fajla/
## ============================================================
collections:
  projects:
    output: true
    permalink: /portfolio/:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

## ============================================================
##  Категории фильтрации портфолио.
##  key — техническое имя (используется в data-атрибутах и front matter),
##  label — то, что видит пользователь.
##  Чтобы добавить новую категорию — просто добавь строку сюда
##  и используй тот же key в файле проекта.
## ============================================================
project_categories:
  - key: restoration
    label: "Реставрация"
  - key: multistory
    label: "Жилые"
  - key: public
    label: "Общественные"
  - key: parking
    label: "Паркинг"

## ============================================================
##  Тип раздела проекта (вторая, независимая фильтрация).
##  Чтобы добавить новый тип — так же просто добавь строку сюда.
## ============================================================
project_types:
  - key: kzh
    label: "КЖ"
  - key: ar
    label: "АР"
  - key: kr
    label: "КР"

markdown: kramdown
kramdown:
  input: GFM

sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-sitemap
